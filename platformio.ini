; PlatformIO Project Configuration File
;
; Two environments are supported — select one when building/uploading:
;   pio run -e uno_r4_wifi --target upload
;   pio run -e nano33iot  --target upload
;
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 115200

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
build_flags = -I include/uno_r4_wifi
lib_deps =
    bblanchon/ArduinoJson
    olikraus/U8g2@^2.35.10

[env:nano33iot]
platform = atmelsam
board = nano_33_iot
framework = arduino
build_flags = -I include/nano33iot
lib_deps =
    bblanchon/ArduinoJson
    olikraus/U8g2@^2.35.10
    arduino-libraries/WiFiNINA
    khoih-prog/FlashStorage_SAMD@^1.3.2
